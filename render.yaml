services:
  - type: web
    name: jma-weather-report
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: waitress-serve --host 0.0.0.0 --port $PORT app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: AUTO_PREPARE_DATA
        value: "1"
      - key: FLASK_DEBUG
        value: "0"
